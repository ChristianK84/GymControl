<div class="publish-container">
  <div class="publish-header">
    <div>
      <h1 class="publish-title">Publicar Versión</h1>
      <p class="publish-subtitle">Registra una nueva versión OTA para los dispositivos Android/iOS</p>
    </div>
  </div>

  <div class="form-card">
    <h3 class="form-title">Datos de la versión</h3>

    <div class="form-grid">
      <label class="form-label">
        Plataforma
        <ion-select class="form-select" fill="outline" interface="popover"
          [(ngModel)]="platform">
          <ion-select-option value="android">Android</ion-select-option>
          <ion-select-option value="ios">iOS</ion-select-option>
        </ion-select>
      </label>

      <label class="form-label">
        Versión
        <ion-input class="form-input" fill="outline" placeholder="Ej. 1.0.2"
          [(ngModel)]="version"></ion-input>
        @if (errors['version']) {
          <span class="field-error">{{ errors['version'] }}</span>
        }
      </label>

      <label class="form-label">
        Version Code
        <ion-input class="form-input" fill="outline" type="number" placeholder="Ej. 3"
          [(ngModel)]="versionCode"></ion-input>
        @if (errors['versionCode']) {
          <span class="field-error">{{ errors['versionCode'] }}</span>
        }
      </label>

      <label class="form-label form-label-full">
        URL del Bundle
        <ion-input class="form-input" fill="outline" placeholder="https://github.com/.../bundle.zip"
          [(ngModel)]="bundleUrl"></ion-input>
        @if (errors['bundleUrl']) {
          <span class="field-error">{{ errors['bundleUrl'] }}</span>
        }
      </label>

      <label class="form-label form-label-full">
        Notas de la versión (opcional)
        <ion-textarea class="form-textarea" fill="outline" rows="4" auto-grow
          placeholder="Correcciones de errores, nuevas funcionalidades..."
          [(ngModel)]="releaseNotes"></ion-textarea>
      </label>
    </div>

    <div class="form-actions">
      <ion-button class="btn-publish" (click)="publish()" fill="solid" [disabled]="sending()">
        @if (sending()) {
          <ion-icon name="cloud-upload-outline" slot="start"></ion-icon>
          Publicando...
        } @else {
          <ion-icon name="cloud-upload-outline" slot="start"></ion-icon>
          Publicar Versión
        }
      </ion-button>
    </div>
  </div>
</div>
